<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EPUB Reader</title>
    <!-- 使用本地 JS 库，支持离线阅读 -->
    <script src="js/jszip.min.js"></script>
    <script src="js/epub.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        #viewer {
            width: 100%;
            height: 100%;
            position: relative;
            /* 确保 viewer 在最上层 */
            z-index: 1;
        }
        
        .epub-container {
            width: 100%;
            height: 100%;
        }
        
        /* 加载指示器 */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
            /* 隐藏时不阻挡事件 */
            pointer-events: none;
        }
        
        /* 当 loading 显示时，允许交互 */
        #loading[style*="display: block"] {
            pointer-events: auto;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 错误提示 */
        #error {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #e74c3c;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>加载中...</div>
    </div>
    
    <div id="error">
        <h3>加载失败</h3>
        <p id="error-message"></p>
    </div>
    
    <div id="viewer"></div>
    
    <script>
        let book = null;
        let rendition = null;
        let currentLocation = null;
        let isLoaded = false;

        window.onload = function() {
            // 通知 Android js 已经准备好
            if (Android && Android.onHtmlReady){
                Android.onHtmlReady();
            }
        };

        function clearRendition(){
            // 销毁旧的 rendition（如果存在）
            if (rendition) {
                console.log('Destroying old rendition...');
                rendition.destroy();
                rendition = null;
            }
        }
        function clearBook(){
            if (book) {
                console.log('Destroying old book...');
                book.destroy();
                book = null;
            }
        }

        window.onunload = function() {
            // 清理资源
            clearRendition();
            clearBook();
        };

        // Android 接口
        const Android = window.Android || {
            onPageChanged: function(location) {
                console.log('Page changed:', location);
            },
            onLoadComplete: function() {
                console.log('Load complete');
            },
            onError: function(message) {
                console.error('Error:', message);
            },
            onHtmlReady: function() {
                console.log('html ready');
            }
        };
        
        // 初始化阅读器
        function initReader(epubUrl, startCfi) {
            console.log('=== EPUB Reader Init Start ===');
            console.log('EPUB URL:', epubUrl);
            console.log('Start CFI:', startCfi || '(none, will show first page)');
            console.log('ePub function exists:', typeof ePub !== 'undefined');
            console.log('JSZip exists:', typeof JSZip !== 'undefined');
            
            try {
                console.log('Initializing reader with URL:', epubUrl);

                // 清理资源
                clearRendition();
                clearBook();

                isLoaded = false;
                
                // 显示加载指示器
                document.getElementById('loading').style.display = 'block';
                document.getElementById('error').style.display = 'none';
                
                // 检查 ePub 函数是否存在
                if (typeof ePub === 'undefined') {
                    throw new Error('ePub library not loaded. Check js/epub.min.js file.');
                }
                
                // 创建 EPUB 实例
                console.log('Creating ePub instance...');
                book = ePub(epubUrl);
                console.log('ePub instance created:', book);

                // 创建渲染器 - 使用分页模式
                console.log('Creating renderer...');
                rendition = book.renderTo("viewer", {
                    width: "100%",
                    height: "100%",
                    flow: "paginated", // 分页模式
                    manager: "continuous",
                    spread: "auto",
                    snap: true
                    // 启用触摸滑动
                    // swipeDelta: 50,
                    // 确保 iframe 可以接收事件
                    // ignoreClass: "annotator-hl"
                });
                console.log('Renderer created');

                // 监听位置变化（动态获取总页数）
                rendition.on("relocated", (location) => {
                    currentLocation = location;
                    const totalPages = location.start.displayed.total || 1;
                    const currentPage = location.start.displayed.page || 1;
                    
                    const pageInfo = {
                        cfi: location.start.cfi,
                        percentage: location.start.percentage || 0,
                        currentPage: currentPage,
                        totalPages: totalPages
                    };
                    
                    console.log('Page relocated:', pageInfo);
                    
                    if (Android && Android.onPageChanged) {
                        Android.onPageChanged(JSON.stringify(pageInfo));
                    }
                });
                
                // 监听渲染器调整大小
                rendition.on("resized", (size) => {
                    console.log('Renderer resized:', size);
                });
                
                // 监听加载完成
                book.ready.then(() => {
                    console.log('Book ready');
                    return book.loaded.metadata;
                }).then((metadata) => {
                    console.log('Book metadata loaded:', metadata);
                }).catch((error) => {
                    console.error('Book ready error:', error);
                });

                // 异步生成位置信息（不阻塞首屏）
                book.ready.then(() => {
                    console.log('Generating locations asynchronously...');
                    return book.locations.generate(1024);
                }).then(() => {
                    console.log('Locations generated');
                }).catch((err) => {
                    console.error('Location generation error:', err);
                });

                // 显示书籍（如果有 startCfi 则跳转到该位置，否则显示首页）
                console.log('Displaying book...', startCfi ? 'at saved position: ' + startCfi : '(first page)');

                // 验证 cfi 的有效性
                var displayCfi = null;
                if (startCfi && typeof startCfi === 'string' && startCfi.trim() !== '') {
                    // CFI 通常以 "epubcfi(" 开头
                    if (startCfi.startsWith('epubcfi(')) {
                        console.log('Valid CFI format detected:', startCfi);
                        displayCfi = startCfi;
                    } else {
                        console.warn('Invalid CFI format:', startCfi, '- will show first page instead');
                    }
                }
                console.log('Displaying book with CFI:', displayCfi);

                // 只有当 displayCfi 有有效值时才传入参数，否则不传参以显示第一页
                var displayPromise;
                if (displayCfi) {
                    displayPromise = rendition.display(displayCfi);
                } else {
                    displayPromise = rendition.display();
                }

                displayPromise.then(() => {
                    console.log('Book displayed successfully');
                    hideLoading();
                    isLoaded = true;

                    // 通知 Android 加载完成
                    if (Android && Android.onLoadComplete) {
                        Android.onLoadComplete();
                    }
                }).catch((error) => {
                    console.error('Display error:', error);
                    console.error('Error stack:', error.stack);
                    showError("显示书籍失败: " + error.message);
                });

            } catch (error) {
                console.error('Init error:', error);
                showError("初始化失败: " + error.message);
                hideLoading();
            }
        }
        

        // 跳转到指定位置
        function goToLocation(cfi) {
            console.log('Going to location:', cfi);
            if (rendition) {
                rendition.display(cfi).then(() => {
                    console.log('Location displayed');
                }).catch((error) => {
                    console.error('Failed to go to location:', error);
                });
            }
        }
        
        // 上一页
        function prevPage() {
            console.log('Going to previous page');
            if (rendition) {
                rendition.display().then(() => {
                    console.log('Book displayed');
                }).catch((error) => {
                    console.error('Failed to go to previous page:', error);
                });
            }
        }
        
        // 下一页
        function nextPage() {
            console.log('Going to next page');
            if (rendition) {
                rendition.display().then(() => {
                    console.log('Book displayed');
                }).catch((error) => {
                    console.error('Failed to go to next page:', error);
                });
            }
        }
        
        // 跳转到百分比位置
        function goToPercentage(percentage) {
            console.log('Going to percentage:', percentage);
            if (book && rendition && percentage >= 0 && percentage <= 1) {
                console.log('Generating locations...');
                const cfi = book.locations.cfiFromPercentage(percentage);
                if (cfi) {
                    console.log('Generated CFI:', cfi);
                    rendition.display(cfi).then(() => {;
                        console.log('Percentage location displayed');
                    }).catch((error) => {
                        console.error('Failed to go to percentage location:', error);
                    });
                }
            } else {
                console.error('Invalid percentage value');
            }
        }

        // 获取当前页面的文本
        function getCurrentPageText(){
            return '测试test';
        }
        
        // 隐藏加载指示器
        function hideLoading() {
            const loadingEl = document.getElementById('loading');
            loadingEl.style.display = 'none';
            // 确保完全移除，不阻挡事件
            loadingEl.style.visibility = 'hidden';
            loadingEl.style.pointerEvents = 'none';
            console.log('Loading indicator hidden, viewer should be interactive');
        }
        
        // 显示错误
        function showError(message) {
            hideLoading();
            document.getElementById('error').style.display = 'block';
            document.getElementById('error-message').textContent = message;
            
            if (Android && Android.onError) {
                Android.onError(message);
            }
        }
        // 清理资源
        function cleanUp() {
            console.log('Resources cleaned up');
            clearRendition();
            clearBook();
        }
        
        // 暴露给 Android 的方法
        window.EpubReader = {
            init: initReader,
            goToLocation: goToLocation,
            prevPage: prevPage,
            nextPage: nextPage,
            goToPercentage: goToPercentage,
            cleanUp: cleanUp
        };
    </script>
</body>
</html>
