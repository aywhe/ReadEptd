<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EPUB Reader</title>

    <!-- 基础样式（布局、结构） -->
    <link rel="stylesheet" type="text/css" href="css/base.css">

    <!-- 主题样式（动态加载，仅包含颜色变量） -->
    <link id="dynamic-theme-style" rel="stylesheet" type="text/css">

    <!-- 使用本地 JS 库，支持离线阅读 -->
    <script src="js/jszip.min.js"></script>
    <script src="js/epub.min.js"></script>
    <script src="js/epub.custom.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        #viewer {
            width: 100%;
            height: 100%;
            position: relative;
            /* 确保 viewer 在最上层 */
            z-index: 1;
        }
        
        .epub-container {
            width: 100%;
            height: 100%;
        }
        
        /* 加载指示器 */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
            /* 隐藏时不阻挡事件 */
            pointer-events: none;
        }
        
        /* 当 loading 显示时，允许交互 */
        #loading[style*="display: block"] {
            pointer-events: auto;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 错误提示 */
        #error {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #e74c3c;
            padding: 20px;
        }
    </style>
</head>
<body>
    <!-- 加载指示器 -->
    <div id="loading">
        <div class="spinner"></div>
        <div>加载中...</div>
    </div>
    
    <!-- 错误提示 -->
    <div id="error">
        <h3>加载失败</h3>
        <p id="error-message"></p>
    </div>
    
    <!-- 阅读器容器 -->
    <div id="viewer"></div>

    <!-- 导航面板（目录） -->
    <div id="nav-panel">
        <div id="nav-content">
            <div class="header">
                <h2>目录</h2>
                <button id="toc-toggle-btn" class="nav-control-btn" onclick="UIManager.toggleTocButton()">隐藏悬浮按钮</button>
                <button class="nav-close-btn" onclick="UIManager.closeNavPanel()">&times;</button>
            </div>
            <hr>
            <div id="toc-container">
                <!-- 目录将在这里动态生成 -->
            </div>
        </div>
    </div>

    <!-- 打开目录按钮 -->
    <button id="toc-btn" onclick="UIManager.handleTocBtnClick()">☰</button>

    <script src="js/epub_reader.core.js"></script>
</body>
</html>
